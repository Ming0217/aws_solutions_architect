# Same shape as the KodeKloud compose, but BUILDS your own image instead of
# pulling kodekloud/photosharing-app. Use this on the EC2 host or locally.
services:
  api:
    build: .                     # build from the Dockerfile in this dir
    image: photoshare-app:local  # tag it (retag + push to ECR for real deploys)
    container_name: photoshare-app
    ports:
      - "80:8000"                # host 80 -> container 8000
    env_file:
      - .env
    restart: always
    healthcheck:
      # python-based check (slim image has no curl)
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
